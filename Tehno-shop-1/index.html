<!DOCTYPE html>
<html lang="ru" class="page">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>California Techno Shop</title>
    <link rel="stylesheet" href="./css/index.css">
</head>

<body class="page__body">
    <header class="header header__container">
        <a class="header__logo" href="">
            <svg width="170" height="21" viewBox="0 0 170 21" role="img" aria-labelledby="logo-title">
                <title id="logo-title">Логотип California</title>
                <use href="./icons/sprite-header.svg#logo-company"></use>
            </svg>
        </a>
        <nav class="header__menu">
            <ul class="header__menu-list">
                <li class="menu__item"> all products <a href=""></a> </li>
                <li class="menu__item"> Solutions <span class="item__icom"> <svg width="12" height="7"
                            viewBox="0 0 12 7" role="img" aria-labelledby="logo-title">
                            <use href="./icons/sprite-header.svg#arrow-down"></use>
                        </svg><a href=""></a> </li>
                <li class="menu__item"> ABOUT <a href=""></a> </li>
                <li class="menu__item"> Support <a href=""></a> </li>
            </ul>
        </nav>
        <div class="header__controls">
            <button class="header__actions-button">
                <svg width="24" height="24">
                    <use class="header__actions-icon" href="./icons/sprite-header.svg#search"></use>
                </svg>
            </button>
            <button class="header__actions-button" aria-label="Корзина" title="Корзина">
                <svg width="24" height="24">
                    <use class="header__actions-icon" href="./icons/sprite-header.svg#cart"></use>
                </svg>
            </button>
        </div>
    </header>
    <section class="hero">
        <div class="section">
            <div class="hero__new-product">
                <div class="hero__container">
                    <button class="hero__arrow" type="button" aria-label="Previous slide">
                        <svg width="14" height="26">
                            <use href="./icons/new-product.svg#arrow"></use>
                        </svg>
                    </button>
                    <div class="hero__card-phone">
                        <h1 class="hero__title">
                            The new phones are here take a look.
                        </h1>
                        <p class="hero__information-text">
                            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Scelerisque in est dui, aliquam,
                            tempor.
                            Faucibus morbi turpis.
                        </p>
                        <button class="hero__export-button">
                            Explore
                        </button>
                    </div>
                    <img class="hero__card-image" src="./images/phones.png" alt="">
                    <button class="hero__arrow-two" type="button" aria-label="Previous slide">
                        <svg width="14" height="26">
                            <use href="./icons/new-product.svg#arrow"></use>
                        </svg>
                    </button>
                </div>
                <div class="hero__pagination" aria-hidden="true">
                    <span class="hero__pagination-line"></span>
                    <span class="hero__pagination-line"></span>
                    <span class="hero__pagination-line"></span>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
